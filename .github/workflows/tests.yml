name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  phpunit:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            illuminate: '^10.0'
            testbench: '^8.0'
            phpunit: '^10.5'
          - php: '8.2'
            illuminate: '^11.0'
            testbench: '^9.0'
            phpunit: '^10.5|^11.0'
          - php: '8.3'
            illuminate: '^12.0'
            testbench: '^10.0'
            phpunit: '^11.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: json

      - name: Install dependencies
        run: |
          composer config --no-interaction policy.advisories.block false
          composer require --dev \
            "illuminate/config:${{ matrix.illuminate }}" \
            "illuminate/container:${{ matrix.illuminate }}" \
            "illuminate/support:${{ matrix.illuminate }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "phpunit/phpunit:${{ matrix.phpunit }}" \
            --no-update \
            --no-interaction
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit
        run: composer test
